<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque — Dicar Veículos | Castanhal/PA</title>
<meta name="description" content="Veja o estoque completo da Dicar Veículos em Castanhal/PA. Seminovos com procedência, garantia e financiamento.">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="index.html">
      <span class="dv">DV</span>
      <span class="bt">DICAR VEÍCULOS<small>CASTANHAL/PA</small></span>
    </a>
    <nav class="nav-links" id="nav-links">
      <a href="index.html">Início</a>
      <a href="estoque.html" class="active">Estoque</a>
      <a href="index.html#sobre">Sobre</a>
      <a href="index.html#contato">Contato</a>
    </nav>
    <div class="nav-cta">
      <a class="btn btn-wa btn-sm" data-wa="Olá! Vim pelo site da Dicar." target="_blank" rel="noopener">💬 WhatsApp</a>
      <button class="menu-btn" id="menu-btn" aria-label="menu">☰</button>
    </div>
  </div>
</header>

<div class="page-head">
  <div class="wrap">
    <div class="bc"><a href="index.html" style="color:#bdbdbd">Início</a> › Estoque</div>
    <h1>Nosso estoque</h1>
    <p style="color:#cfcfcf;margin-top:6px">Seminovos com procedência e garantia. Achou o seu? Chama no WhatsApp.</p>
  </div>
</div>

<div class="wrap estoque-layout">
  <!-- FILTROS -->
  <aside class="filters">
    <h3>Filtrar</h3>
    <div class="fg">
      <label for="f-busca">Buscar</label>
      <input type="text" id="f-busca" placeholder="Ex.: Polo, Fiat...">
    </div>
    <div class="fg">
      <label for="f-marca">Marca</label>
      <select id="f-marca"><option value="">Todas</option></select>
    </div>
    <div class="fg">
      <label for="f-cambio">Câmbio</label>
      <select id="f-cambio">
        <option value="">Todos</option>
        <option value="Manual">Manual</option>
        <option value="Automático">Automático</option>
      </select>
    </div>
    <div class="fg">
      <label for="f-preco">Preço máximo</label>
      <input type="range" id="f-preco" min="40000" max="120000" step="5000">
      <div class="rangeval" id="f-preco-val">Até R$ 120.000</div>
    </div>
  </aside>

  <!-- LISTA -->
  <main>
    <div class="estoque-top">
      <div class="count" id="count"></div>
      <select id="f-ordenar">
        <option value="">Ordenar por</option>
        <option value="preco-asc">Menor preço</option>
        <option value="preco-desc">Maior preço</option>
        <option value="km-asc">Menor km</option>
        <option value="ano-desc">Mais novo</option>
      </select>
    </div>
    <div class="grid-cars estoque" id="grid-estoque"></div>
  </main>
</div>

<footer class="site-footer">
  <div class="wrap">
    <div class="bottom" style="border:0;padding-top:0">
      <span>© <span data-year>2026</span> Dicar Veículos · Castanhal/PA</span>
      <span class="orion-credit">Site por <b>✦ Orion</b> — Presença Digital</span>
    </div>
  </div>
</footer>

<a class="wa-float" data-wa="Olá! Vim pelo site da Dicar." target="_blank" rel="noopener" aria-label="WhatsApp">💬</a>

<script src="assets/js/store.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
